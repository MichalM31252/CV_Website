<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Michał Malinowski — Data Scientist</title>
    <meta
      name="description"
      content="Michał Malinowski — Data Scientist based in Gdańsk. Data Engineering student at Gdańsk University of Technology, currently at Ergo Hestia. Python, SQL, Databricks, Power BI."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230A0E16'/><text x='50' y='68' font-size='52' font-family='monospace' fill='%23E5A84B' text-anchor='middle'>M</text></svg>"
    />
    <!-- Critical: paint the dark theme immediately so the async stylesheets below
         can't cause a flash of white before they apply. -->
    <style>
      :root { color-scheme: dark; }
      html, body { background: #0a0e16; }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Load stylesheets without blocking first paint. The page has no above-the-fold
         HTML (content is rendered by Vue), so applying CSS a moment later is safe, and
         the fonts use display=swap to show a system fallback until they arrive. -->
    <link
      rel="preload"
      as="style"
      href="css/styles.css"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="css/styles.css" />
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      />
    </noscript>
    <script type="importmap">
      {
        "imports": {
          "vue": "https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.esm-browser.prod.js"
        }
      }
    </script>
  </head>
  <body>
    <noscript>
      This site needs JavaScript to render. You can still reach me at
      <a href="mailto:michalmalinowski29@gmail.com" style="color: #4fd1c5">michalmalinowski29@gmail.com</a>.
    </noscript>

    <div id="app"></div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
